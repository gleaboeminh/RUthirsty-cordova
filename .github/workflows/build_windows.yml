name: Build Windows EXE

on:
  push:
    branches: ["main"]
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  build-windows:
    name: Build EXE on Windows
    runs-on: windows-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      # ── 3. Dependencies ────────────────────────────────────────────────────
      - name: Install runtime + build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyQt5 Pillow pyinstaller

      # ── 4. Icon ────────────────────────────────────────────────────────────
      - name: Generate application icon
        run: python build_icon.py

      # ── 5. Build EXE ───────────────────────────────────────────────────────
      - name: Build single-file EXE with PyInstaller
        run: pyinstaller toeic_speaking.spec

      # ── 6. Smoke-test: check EXE exists and has non-trivial size ──────────
      - name: Verify EXE was produced
        shell: pwsh
        run: |
          $exe = "dist\TOEIC_Speaking_Practice.exe"
          if (-not (Test-Path $exe)) { throw "EXE not found: $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "EXE size: $([math]::Round($size/1MB, 1)) MB"
          if ($size -lt 5MB) { throw "EXE looks too small ($size bytes)" }

      # ── 7. Upload artifact ─────────────────────────────────────────────────
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: TOEIC_Speaking_Practice_Windows
          path: dist/TOEIC_Speaking_Practice.exe
          retention-days: 90
          if-no-files-found: error
